[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "synaptiq-sdk"
version = "0.1.0"
description = "SDK Python pour l'API SynaptiQ — second-brain vectoriel pour agents IA."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/Jimmyjoe13/synaptiq"

[tool.setuptools]
packages = ["synaptiq_sdk"]
