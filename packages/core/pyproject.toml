[project]
name = "synaptiq-core"
version = "0.1.0"
description = "Logique partagée de SynaptiQ : embeddings pluggables et gouvernance mémoire."
requires-python = ">=3.11"
dependencies = ["requests>=2.31"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["synaptiq_core"]
